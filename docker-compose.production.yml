services:
  php-fpm:
    image: ${IMAGE_NAME:-ghcr.io/arzamaskov/runtracker}:${APP_TAG:-app-latest}
    container_name: runtracker-php-fpm
    restart: unless-stopped
    env_file:
      - app.env
    volumes:
      - ./database/database.sqlite:/var/www/html/database/database.sqlite
      - ./storage:/var/www/html/storage
    networks:
      - runtracker

  nginx:
    image: nginx:alpine
    container_name: runtracker-nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:80"
    volumes:
      - ./public:/var/www/html/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost/api/healthcheck || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      - php-fpm
    networks:
      - runtracker

networks:
  runtracker:
    driver: bridge
