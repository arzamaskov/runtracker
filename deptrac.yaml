deptrac:
  paths:
    - app
    - src

  exclude_files:
    - '#^vendor/.*#'

  layers:
    # Domain Layer - pure business logic
    - name: Domain
      collectors:
        - type: directory
          value: src/Domain/.*

    # Application Layer - use cases, application services
    - name: Application
      collectors:
        - type: directory
          value: src/Application/.*

    # Catch-all for files directly in src/ (should not exist)
    - name: SrcRoot
      collectors:
        - type: directory
          value: src/[^/]+\.php$
          regex: true

    # Infrastructure Layer - Laravel adapters
    - name: Infrastructure
      collectors:
        - type: directory
          value: app/.*

    # Laravel Framework
    - name: LaravelFramework
      collectors:
        - type: classNameRegex
          value: '#^Illuminate\\.*#'
        - type: classNameRegex
          value: '#^Laravel\\.*#'

    # 👇 НОВОЕ: Symfony (Laravel на нём построен)
    - name: Symfony
      collectors:
        - type: classNameRegex
          value: '#^Symfony\\.*#'

    # 👇 (опционально, но полезно)
    - name: Psr
      collectors:
        - type: classNameRegex
          value: '#^Psr\\.*#'

  ruleset:
    # Domain has no dependencies
    Domain: []

    # Application can only depend on Domain
    Application:
      - Domain

    # SrcRoot should not use anything (red flag)
    SrcRoot: []

    # Infrastructure can depend on everything внешнее
    Infrastructure:
      - Application
      - Domain
      - LaravelFramework
      - Symfony
      - Psr

    # Framework слои изолированы
    LaravelFramework: []
    Symfony: []
    Psr: []
